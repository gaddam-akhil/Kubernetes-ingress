apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
  labels:
    project: app1
    tier: frontend
    component: frontend 
spec:
    replicas: 2
    selector:
      matchLabels:  
        project: app1
        tier: frontend
        component: frontend 
    template:
      metadata:
       labels:
         project: app1
         tier: frontend
         component: frontend 
      spec:
        containers:
        - name: app1
          image: gaddamakhil/app1:1.0.0
---
apiVersion: v1
kind: Service
metadata:
  name: app1
spec:
  selector:
    # labels are used as selectors
    project: app1
    tier: frontend
    component: frontend 
  ports:
  - protocol: TCP
    port: 80 #sevice port (internal cluster IP)
    targetPort: 80      
