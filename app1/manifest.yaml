apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
 # these labels are replicaset labels
  labels:
    project: roboshop
    tier: frontend
    component: app1
spec:
    replicas: 2
    selector:
      # using these labels replica set selects the pod
      matchLabels:  
        project: roboshop
        tier: frontend
        component: app1
        # This is pod definition, pod is subset of replicaset
    template:
      metadata:
       labels:
         project: roboshop
         tier: frontend
         component: app1 
      spec:
        containers:
        - name: app1
          image: gaddamakhil/app1:1.0.0
---
apiVersion: v1
kind: Service
metadata:
  name: app1
spec:
  selector:
    # labels are used as selectors
    project: roboshop
    tier: frontend
    component: app1 
  ports:
  - protocol: TCP
    port: 80 #sevice port (internal cluster IP)
    targetPort: 80      
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app1
  annotations:
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:601930231965:certificate/ecf1afd7-f9c8-4e78-9f0f-446324f845ed
    alb.ingress.kubernetes.io/frontend-nlb-scheme: internet-facing
    alb.ingress.kubernetes.io/tags: Environment=dev,project=roboshop
    alb.ingress.kubernetes.io/target-type: ip
spec:
  ingressClassName: alb
  rules:
  - host: "app1.gaddam.online"
    http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: app1
            port:
              number: 80
 
